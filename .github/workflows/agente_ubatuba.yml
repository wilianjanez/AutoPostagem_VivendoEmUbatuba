name: 🤖 Agente Vivendo em Ubatuba
on:
  schedule:
    - cron: "0 9 * * *"  # 06h00 BRT (09h00 UTC)
  workflow_dispatch:
jobs:
  publicar-post:
    name: Buscar notícias e publicar no Instagram e YouTube
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4
      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 📦 Instalar dependências
        run: |
          pip install requests python-dotenv Pillow numpy
          pip install moviepy==1.0.3
          pip install google-auth-oauthlib google-api-python-client google-auth-httplib2
      - name: 🔐 Configurar variáveis de ambiente
        run: |
          echo "TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}" >> .env
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> .env
          echo "IG_ACCESS_TOKEN=${{ secrets.IG_ACCESS_TOKEN }}" >> .env
          echo "IG_USER_ID=${{ secrets.IG_USER_ID }}" >> .env
          echo "IMGBB_API_KEY=${{ secrets.IMGBB_API_KEY }}" >> .env
          echo "FUNDO_URLS=${{ secrets.FUNDO_URLS }}" >> .env
          echo "FONT_BOLD_PATH=${{ secrets.FONT_BOLD_PATH }}" >> .env
          echo "FONT_REG_PATH=${{ secrets.FONT_REG_PATH }}" >> .env
          echo "FONT_EMOJI_PATH=${{ secrets.FONT_EMOJI_PATH }}" >> .env
          echo "YOUTUBE_CLIENT_ID=${{ secrets.YOUTUBE_CLIENT_ID }}" >> .env
          echo "YOUTUBE_CLIENT_SECRET=${{ secrets.YOUTUBE_CLIENT_SECRET }}" >> .env
          echo "YOUTUBE_REFRESH_TOKEN=${{ secrets.YOUTUBE_REFRESH_TOKEN }}" >> .env
          echo "FTP_HOST=${{ secrets.FTP_HOST }}" >> .env
          echo "FTP_USER=${{ secrets.FTP_USER }}" >> .env
          echo "FTP_PASS=${{ secrets.FTP_PASS }}" >> .env
          echo "FTP_PASTA=${{ secrets.FTP_PASTA }}" >> .env
          echo "FTP_URL=${{ secrets.FTP_URL }}" >> .env
          echo "FUNDO_SOL_URLS=${{ secrets.FUNDO_SOL_URLS }}" >> .env
          echo "FUNDO_CHUVA_URLS=${{ secrets.FUNDO_CHUVA_URLS }}" >> .env
          echo "FUNDO_NUBLADO_URLS=${{ secrets.FUNDO_NUBLADO_URLS }}" >> .env
          echo "FUNDO_TEMPESTADE_URLS=${{ secrets.FUNDO_TEMPESTADE_URLS }}" >> .env          
      - name: 🚀 Executar agente
        run: python agente_ubatuba.py
      - name: 📋 Salvar log de execução
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: log-${{ github.run_id }}
          path: agente_ubatuba.log
          retention-days: 30
